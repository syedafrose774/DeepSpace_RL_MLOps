<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Space Probe - AI Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    <div class="twinkling"></div>
    
    <div class="dashboard-container">
        <header>
            <h1>DEEP SPACE PROBE <span class="ai-badge">AI CORE</span></h1>
            <p>Autonomous DQN Communication Scheduler</p>
        </header>

        <main>
            <!-- Control Panel -->
            <section class="panel control-panel">
                <h2>Telemetry Controls</h2>
                
                <div class="control-group">
                    <label>Battery Level: <span id="battery-val">75%</span></label>
                    <input type="range" id="battery" min="0" max="100" value="75">
                </div>

                <div class="control-group">
                    <label>Signal Strength: <span id="signal-val">0.82</span></label>
                    <input type="range" id="signal" min="0" max="1" step="0.01" value="0.82">
                </div>

                <div class="control-group">
                    <label>Storage Usage: <span id="storage-val">55%</span></label>
                    <input type="range" id="storage" min="0" max="100" value="55">
                </div>

                <div class="control-group queue-group">
                    <div>
                        <label>High Prio Queue: <span id="high-queue-val">12</span></label>
                        <input type="range" id="high-queue" min="0" max="50" value="12">
                    </div>
                    <div>
                        <label>Low Prio Queue: <span id="low-queue-val">8</span></label>
                        <input type="range" id="low-queue" min="0" max="50" value="8">
                    </div>
                </div>
                
                <div class="control-group">
                    <label>System Health: <span id="health-val">90%</span></label>
                    <input type="range" id="health" min="0" max="100" value="90">
                </div>

                <div class="toggle-group">
                    <label>Comm Window:</label>
                    <label class="switch">
                        <input type="checkbox" id="comm-window" checked>
                        <span class="slider round"></span>
                    </label>
                    <span id="window-status" class="status-open">OPEN</span>
                </div>
            </section>

            <!-- Display Panel -->
            <section class="panel display-panel">
                <div class="status-header">
                    <h2>AI DIRECTIVE</h2>
                    <div class="pulse-ring"></div>
                </div>
                
                <div class="decision-display">
                    <div id="ai-decision" class="action-text waiting">AWAITING TELEMETRY...</div>
                </div>

                <div class="auto-pilot-box">
                    <h3>Simulation Mode</h3>
                    <button id="autopilot-btn" class="btn-neon">ENGAGE AUTO-PILOT</button>

                    <p class="sub-text">Simulates dynamic cosmic environment</p>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
